# Save as /etc/nginx/sites-available/arianeygiuseppe.enigmasac.com
# Then: sudo ln -s /etc/nginx/sites-available/arianeygiuseppe.enigmasac.com /etc/nginx/sites-enabled/
# And:  sudo certbot --nginx -d arianeygiuseppe.enigmasac.com
# Certbot will rewrite the listen 443 block automatically the first time.

server {
    listen 80;
    listen [::]:80;
    server_name arianeygiuseppe.enigmasac.com;

    # Certbot will inject the redirect once HTTPS is set up.
    location / {
        proxy_pass http://127.0.0.1:4200;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 5m;
    }
}
